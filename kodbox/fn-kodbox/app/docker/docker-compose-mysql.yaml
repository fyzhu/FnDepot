services:
  db:
    image: mysql:5.7
    container_name: kodbox-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: kodbox
      MYSQL_USER: kodbox
      MYSQL_PASSWORD: kodbox123
    volumes:
      - ./db:/var/lib/mysql

  kodbox:
    image: kodcloud/kodbox:latest
    container_name: kodbox
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./data:/var/www/html
    depends_on:
      - db
    environment:
      - TZ=Asia/Shanghai